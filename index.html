<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskflow - To Do App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <div class="todo-card">
      <h1>Taskflow</h1>
      <p class="subtitle">Organize your day, one task at a time</p>

      <div class="input-group">
        <input
          type="text"
          id="taskInput"
          placeholder="Add a new task..."
        />
        <button id="addBtn">+</button>
      </div>

      <ul id="taskList"></ul>

      <div class="empty-state" id="emptyState">
        <h3>No tasks here</h3>
        <p>Add your first task above to get started</p>
      </div>

      <div class="bottom-section">
        <p id="taskCount">0 tasks left</p>

        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Done</button>
        </div>
      </div>

      <p class="footer-text">
        Tasks are saved automatically and persist across sessions
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
